name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'E2E test scope'
        required: false
        default: 'fast'
        type: choice
        options:
          - 'none'
          - 'fast'
          - 'all'

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Unit tests (always run, no API key needed)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./mimo-harness[dev]"
        pip install playwright

    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps

    - name: Run mimo-harness unit tests
      run: |
        python -m pytest mimo-harness/tests/ \
          --ignore=mimo-harness/tests/test_e2e.py \
          -v --tb=short

    - name: Run stage unit tests
      env:
        MIMO_API_KEY: test-key-for-testing
        MIMO_BASE_URL: http://localhost:8080/v1
        MIMO_MODEL: test-model
      run: |
        python -m pytest tests/test_stage_unit.py \
          -v --tb=short

    - name: Run tests with coverage
      if: matrix.python-version == '3.12'
      run: |
        python -m pytest mimo-harness/tests/ \
          --ignore=mimo-harness/tests/test_e2e.py \
          --cov=mimo_harness \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # 2. Fast E2E tests (~34 tests, <10min, no multi-step/heavy API)
  #    Runs on push to main, PR, or manual trigger with run_e2e=fast/all
  # ─────────────────────────────────────────────────────────────
  e2e-fast:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_e2e == 'fast' ||
      github.event.inputs.run_e2e == 'all'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./mimo-harness[dev]"

    - name: Run fast Harness E2E tests
      env:
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        MIMO_MODEL: ${{ secrets.MIMO_MODEL }}
      run: |
        python -m pytest mimo-harness/tests/test_e2e.py -m "not slow" -v --tb=short

    - name: Run fast Stage E2E tests
      env:
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        MIMO_MODEL: ${{ secrets.MIMO_MODEL }}
      run: |
        python -m pytest tests/test_e2e.py -v --tb=short

  # ─────────────────────────────────────────────────────────────
  # 3. Full E2E tests (~12 slow tests, ~20min, multi-step/heavy API)
  #    Only runs on manual trigger with run_e2e=all
  # ─────────────────────────────────────────────────────────────
  e2e-full:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_e2e == 'all'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./mimo-harness[dev]"

    - name: Run slow Harness E2E tests
      env:
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        MIMO_MODEL: ${{ secrets.MIMO_MODEL }}
      run: |
        python -m pytest mimo-harness/tests/test_e2e.py -m "slow" -v --tb=short
