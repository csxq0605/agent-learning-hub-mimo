name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Unit tests (always run, no API key needed)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./mimo-harness[dev]"
        pip install playwright

    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps

    - name: Run mimo-harness unit tests
      run: |
        python -m pytest mimo-harness/tests/ \
          --ignore=mimo-harness/tests/test_e2e.py \
          -v --tb=short

    - name: Run stage unit tests
      env:
        MIMO_API_KEY: test-key-for-testing
        MIMO_BASE_URL: http://localhost:8080/v1
        MIMO_MODEL: test-model
      run: |
        python -m pytest tests/test_stage_unit.py \
          -v --tb=short

    - name: Run tests with coverage
      if: matrix.python-version == '3.12'
      run: |
        python -m pytest mimo-harness/tests/ \
          --ignore=mimo-harness/tests/test_e2e.py \
          --cov=mimo_harness \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # 2. E2E tests (only when API secrets are configured)
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    # Only run when secrets are available (not on fork PRs)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./mimo-harness[dev]"
        pip install playwright

    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps

    - name: Run Stage E2E tests
      env:
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        MIMO_MODEL: ${{ secrets.MIMO_MODEL }}
      run: |
        python -m pytest tests/test_e2e.py -v --tb=short

    - name: Run Harness E2E tests
      env:
        MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        MIMO_MODEL: ${{ secrets.MIMO_MODEL }}
      run: |
        python -m pytest mimo-harness/tests/test_e2e.py -v --tb=short
